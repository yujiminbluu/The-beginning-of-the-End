<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Profile</title>
    <style>
        /* นำเข้าฟอนต์สไตล์อวกาศ/เทคโนโลยี และฟอนต์ไทย */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Sarabun:wght@300;400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #050505; /* พื้นหลังสีดำสนิท */
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* เพิ่มแสงเรืองแสงที่พื้นหลังแบบจางๆ */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 128, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 195, 255, 0.08), transparent 25%);
        }

        /* กล่องเนื้อหาแบบกระจก (Glassmorphism) */
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 128, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.1),
                        inset 0 0 15px rgba(0, 195, 255, 0.05);
            position: relative;
            z-index: 10;
        }

        /* เอฟเฟกต์กรอบสีรุ้งเรืองแสงหมุนรอบกล่อง */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #00ff80, #00c3ff, #00ff80);
            z-index: -1;
            border-radius: 22px;
            filter: blur(12px);
            opacity: 0.4;
            animation: glow 4s linear infinite;
        }

        @keyframes glow {
            0% { filter: blur(12px) hue-rotate(0deg); }
            100% { filter: blur(12px) hue-rotate(360deg); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            font-size: 2.2em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 255, 128, 0.6);
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            color: #00ff80;
            font-size: 0.9em;
            margin-bottom: 30px;
            letter-spacing: 2px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #c0c0c0;
            margin-bottom: 30px;
        }

        /* ป้าย Tag แสดงสกิลเท่ๆ */
        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 255, 128, 0.1);
            border: 1px solid #00ff80;
            color: #00ff80;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85em;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 8px rgba(0, 255, 128, 0.3);
            transition: all 0.3s ease;
        }

        .tag.blue {
            border-color: #00c3ff;
            color: #00c3ff;
            background: rgba(0, 195, 255, 0.1);
            box-shadow: 0 0 8px rgba(0, 195, 255, 0.3);
        }

        .tag:hover {
            transform: translateY(-3px);
            background: rgba(0, 255, 128, 0.3);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>HELLO WORLD</h1>
        <div class="subtitle">SYSTEM ONLINE_</div>
        <p>ยินดีต้อนรับสู่โปรเจกต์ของผมครับ<br>นักศึกษาวิศวกรรมคอมพิวเตอร์ที่สนใจในการพัฒนา Digital Circuits, Software และ AI</p>
        <div class="tech-stack">
            <span class="tag">HARDWARE</span>
            <span class="tag blue">SOFTWARE</span>
            <span class="tag">AI DESIGN</span>
        </div>
    </div>
</body>
</html>
