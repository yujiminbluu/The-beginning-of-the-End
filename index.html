<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - มณฑล พรมเพ็ง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #1a1a1a;
            padding: 50px 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2em;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .student-id {
            font-size: 1.1em;
            color: #888888;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .section-title {
            font-size: 0.85em;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 45px;
        }

        .tag {
            background-color: transparent;
            border: 1px solid #444;
            color: #cccccc;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .tag:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        .btn-commit {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ffffff;
            color: #121212;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-commit:hover {
            background-color: #dddddd;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>มณฑล พรมเพ็ง</h1>
        <div class="student-id">รหัสนักศึกษา: 673110310012</div>

        <div class="section-title">Interests</div>
        <div class="tags-container">
            <span class="tag">การเขียนเว็บ</span>
            <span class="tag">AI</span>
            <span class="tag">Data Science</span>
        </div>

        <a href="https://github.com/yujiminbluu/The-beginning-of-the-End/commits/main/" class="btn-commit" target="_blank">
            View Commits
        </a>
    </div>
</body>
</html>
